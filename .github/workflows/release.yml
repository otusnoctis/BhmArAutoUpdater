name: Build and Release on Tag

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_NAME: BhmArAutoUpdater
  TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
  RUNTIME_ID: win-x64

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore ./BhmArAutoUpdater/BhmArAutoUpdater.csproj
          
      - name: Publish Win-x64
        run: >
          dotnet publish ./BhmArAutoUpdater/BhmArAutoUpdater.csproj
          -c Release
          -f ${{ env.TARGET_FRAMEWORK }}
          -r ${{ env.RUNTIME_ID }}
          --self-contained true
          -o ./publish/${{ env.RUNTIME_ID }}

      - name: Prepare release package structure
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $technicalFolderName = "${{ env.PROJECT_NAME }}_$version" + "_${{ env.RUNTIME_ID }}"
          $stagingRoot = Join-Path $PWD "staging"
          $appRoot = Join-Path $stagingRoot "app"
          $versionedAppRoot = Join-Path $appRoot $technicalFolderName

          New-Item -ItemType Directory -Path $versionedAppRoot -Force | Out-Null
          Copy-Item -Path "./publish/${{ env.RUNTIME_ID }}/*" -Destination $versionedAppRoot -Recurse -Force
          
      - name: Create ZIP package
        shell: pwsh
        run: Compress-Archive -Path ./staging/* -DestinationPath ./${{ env.PROJECT_NAME }}.zip

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./${{ env.PROJECT_NAME }}.zip
          
